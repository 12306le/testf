name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug / release'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            build/app/intermediates
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Show Flutter info
        run: |
          flutter --version
          flutter doctor -v

      - name: Build APK (debug)
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug'
        run: flutter build apk --debug --target-platform android-arm64

      - name: Build APK (release)
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        run: flutter build apk --release --target-platform android-arm64,android-arm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto_clicker-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
