name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug / release'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            build/app/intermediates
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Fill missing scaffolding (wrapper + launcher icons)
        run: |
          set -e
          TMP=$(mktemp -d)
          flutter create --platforms=android --org com.autoclicker --project-name auto_clicker_tmp "$TMP/tmp_app" >/dev/null
          mkdir -p android/gradle/wrapper
          cp -n "$TMP/tmp_app/android/gradle/wrapper/gradle-wrapper.jar" android/gradle/wrapper/ 2>/dev/null || true
          cp -n "$TMP/tmp_app/android/gradle/wrapper/gradle-wrapper.properties" android/gradle/wrapper/ 2>/dev/null || true
          cp -n "$TMP/tmp_app/android/gradlew" android/ 2>/dev/null || true
          cp -n "$TMP/tmp_app/android/gradlew.bat" android/ 2>/dev/null || true
          chmod +x android/gradlew || true
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "android/app/src/main/res/$d"
            cp -n "$TMP/tmp_app/android/app/src/main/res/$d/ic_launcher.png" "android/app/src/main/res/$d/ic_launcher.png" 2>/dev/null || true
          done
          echo "--- android/ tree ---"
          ls -la android/ android/gradle/wrapper/ android/app/src/main/res/mipmap-mdpi/ || true

      - name: Show Flutter info
        run: |
          flutter --version
          flutter doctor -v

      - name: Build APK (debug)
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug'
        run: |
          set -o pipefail
          flutter build apk --debug --target-platform android-arm64 --verbose 2>&1 | tee /tmp/build.log

      - name: Build APK (release)
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        run: |
          set -o pipefail
          flutter build apk --release --target-platform android-arm64,android-arm --verbose 2>&1 | tee /tmp/build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto_clicker-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
