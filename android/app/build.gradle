plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// OpenCV 体积大,首次构建时下载。Paddle Lite 头文件+so 直接提交到仓库。
def opencvRoot = file("${projectDir}/opencv")
def opencvDir = file("${opencvRoot}/opencv4.1.0")

task fetchNativeDeps {
    outputs.dir opencvDir
    doLast {
        opencvRoot.mkdirs()
        if (!new File(opencvDir, "arm64-v8a/cmake/OpenCVConfig.cmake").exists()) {
            println "Downloading OpenCV 4.1.0..."
            def tmp = new File(opencvRoot, "ocv.tar.gz")
            new URL("https://paddle-inference-dist.bj.bcebos.com/opencv4.1.0.tar.gz")
                .withInputStream { i -> tmp.withOutputStream { o -> o << i } }
            exec { commandLine 'tar', 'xzf', tmp.absolutePath, '-C', opencvRoot.absolutePath }
            tmp.delete()
        }
    }
}
preBuild.dependsOn fetchNativeDeps

android {
    namespace "com.autoclicker.app"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        main.jniLibs.srcDirs += 'src/main/jniLibs'
    }

    defaultConfig {
        applicationId "com.autoclicker.app"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk { abiFilters 'arm64-v8a' }
        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_shared', '-DANDROID_TOOLCHAIN=clang'
                cppFlags "-std=c++11 -O3"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    packagingOptions {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so']
        }
    }

    signingConfigs {
        release {
            def keystorePath = System.getenv("KEYSTORE_PATH")
            if (keystorePath) {
                storeFile file(keystorePath)
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig System.getenv("KEYSTORE_PATH") ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter { source '../..' }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0"
}
